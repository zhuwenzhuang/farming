name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux artifacts
    runs-on: ubuntu-latest
    env:
      FARMING_BASE_PATH: /farming
      FARMING_RELEASE_VERSION: ${{ github.ref_name }}
    steps:
      - name: Normalize release version
        id: version
        shell: bash
        run: |
          version="${FARMING_RELEASE_VERSION#v}"
          echo "value=${version}" >> "${GITHUB_OUTPUT}"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify release version
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.value }}
        shell: bash
        run: |
          package_version="$(node -p "require('./package.json').version")"
          lock_version="$(node -p "require('./package-lock.json').packages[''].version")"
          if [[ "${RELEASE_VERSION}" != "${package_version}" || "${RELEASE_VERSION}" != "${lock_version}" ]]; then
            echo "Tag, package.json, and package-lock.json versions must match: tag=${RELEASE_VERSION}, package=${package_version}, lock=${lock_version}" >&2
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci --registry=https://registry.npmjs.org/

      - name: Run checks
        run: npm run check

      - name: Build Linux CLI
        env:
          FARMING_RELEASE_VERSION: ${{ steps.version.outputs.value }}
          FARMING_CLI_TARGETS: node22-linux-x64,node22-linux-arm64
        run: npm run release:cli

      - name: Smoke-test Linux CLI server
        env:
          FARMING_RELEASE_VERSION: ${{ steps.version.outputs.value }}
          FARMING_SMOKE_AGENT: "0"
        run: npm run release:cli:smoke -- "releases/${FARMING_RELEASE_VERSION}/farming_${FARMING_RELEASE_VERSION}_linux_amd64"

      - name: Build Linux app bundle
        env:
          FARMING_RELEASE_VERSION: ${{ steps.version.outputs.value }}
        run: npm run release:app

      - name: Verify Linux app bundle
        env:
          FARMING_RELEASE_VERSION: ${{ steps.version.outputs.value }}
        run: node scripts/verify-release-bundle.js "releases/${FARMING_RELEASE_VERSION}/farming-${FARMING_RELEASE_VERSION}-linux-x64.tar.gz"

      - name: Smoke-test Linux app bundle
        env:
          FARMING_RELEASE_VERSION: ${{ steps.version.outputs.value }}
          FARMING_SMOKE_PORT: "6695"
        shell: bash
        run: |
          tmp="$(mktemp -d)"
          tar -xzf "releases/${FARMING_RELEASE_VERSION}/farming-${FARMING_RELEASE_VERSION}-linux-x64.tar.gz" -C "${tmp}"
          npm run release:cli:smoke -- "${tmp}/farming-${FARMING_RELEASE_VERSION}-linux-x64/farming"

      - name: Build legacy Linux app bundle
        env:
          FARMING_RELEASE_VERSION: ${{ steps.version.outputs.value }}
        run: npm run release:app:legacy-linux

      - name: Verify legacy Linux app bundle
        env:
          FARMING_RELEASE_VERSION: ${{ steps.version.outputs.value }}
        run: node scripts/verify-linux-legacy-release.js "releases/${FARMING_RELEASE_VERSION}/farming-${FARMING_RELEASE_VERSION}-linux-x64-legacy-glibc228.tar.gz"

      - name: Smoke-test legacy Linux npm bootstrap and native PTY
        env:
          FARMING_RELEASE_VERSION: ${{ steps.version.outputs.value }}
          FARMING_SMOKE_PORT: "6696"
        shell: bash
        run: |
          tmp="$(mktemp -d)"
          tar -xzf "releases/${FARMING_RELEASE_VERSION}/farming-${FARMING_RELEASE_VERSION}-linux-x64-legacy-glibc228.tar.gz" -C "${tmp}"
          FARMING_USE_GLIBC_RUNTIME=1 npm run release:cli:smoke -- "${tmp}/farming-${FARMING_RELEASE_VERSION}-linux-x64-legacy-glibc228/farming"

      - name: Collect Linux release assets
        env:
          FARMING_RELEASE_VERSION: ${{ steps.version.outputs.value }}
        run: |
          mkdir -p release-upload
          cp "releases/${FARMING_RELEASE_VERSION}/farming_${FARMING_RELEASE_VERSION}_linux_amd64" release-upload/
          cp "releases/${FARMING_RELEASE_VERSION}/farming_${FARMING_RELEASE_VERSION}_linux_arm64" release-upload/
          cp "releases/${FARMING_RELEASE_VERSION}/farming-${FARMING_RELEASE_VERSION}-linux-x64.tar.gz" release-upload/
          cp "releases/${FARMING_RELEASE_VERSION}/farming-${FARMING_RELEASE_VERSION}-linux-x64-legacy-glibc228.tar.gz" release-upload/

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: farming-linux-${{ steps.version.outputs.value }}
          path: release-upload/*
          if-no-files-found: error

  build-macos:
    name: Build macOS ${{ matrix.arch }} artifacts
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            arch: x64
            cliTarget: node22-macos-x64
            cliAsset: darwin_amd64
          - runner: macos-15
            arch: arm64
            cliTarget: node22-macos-arm64
            cliAsset: darwin_arm64
    runs-on: ${{ matrix.runner }}
    env:
      FARMING_BASE_PATH: /farming
      FARMING_RELEASE_VERSION: ${{ github.ref_name }}
    steps:
      - name: Normalize release version
        id: version
        shell: bash
        run: |
          version="${FARMING_RELEASE_VERSION#v}"
          echo "value=${version}" >> "${GITHUB_OUTPUT}"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify release version
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.value }}
        shell: bash
        run: |
          package_version="$(node -p "require('./package.json').version")"
          lock_version="$(node -p "require('./package-lock.json').packages[''].version")"
          if [[ "${RELEASE_VERSION}" != "${package_version}" || "${RELEASE_VERSION}" != "${lock_version}" ]]; then
            echo "Tag, package.json, and package-lock.json versions must match: tag=${RELEASE_VERSION}, package=${package_version}, lock=${lock_version}" >&2
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Verify native runner architecture
        shell: bash
        run: |
          case "${{ matrix.arch }}:$(uname -m)" in
            x64:x86_64|arm64:arm64) ;;
            *) echo "Runner architecture does not match release target: target=${{ matrix.arch }}, host=$(uname -m)" >&2; exit 1 ;;
          esac

      - name: Install dependencies
        run: npm ci --registry=https://registry.npmjs.org/

      - name: Build native macOS CLI
        env:
          FARMING_RELEASE_VERSION: ${{ steps.version.outputs.value }}
          FARMING_CLI_TARGETS: ${{ matrix.cliTarget }}
        run: npm run release:cli

      - name: Smoke-test native macOS CLI
        env:
          FARMING_RELEASE_VERSION: ${{ steps.version.outputs.value }}
        run: npm run release:cli:smoke -- "releases/${FARMING_RELEASE_VERSION}/farming_${FARMING_RELEASE_VERSION}_${{ matrix.cliAsset }}"

      - name: Build macOS app bundle
        env:
          FARMING_RELEASE_VERSION: ${{ steps.version.outputs.value }}
          FARMING_RELEASE_PLATFORM: darwin
          FARMING_RELEASE_ARCH: ${{ matrix.arch }}
        run: npm run release:app

      - name: Verify macOS app bundle
        env:
          FARMING_RELEASE_VERSION: ${{ steps.version.outputs.value }}
        run: node scripts/verify-release-bundle.js "releases/${FARMING_RELEASE_VERSION}/farming-${FARMING_RELEASE_VERSION}-darwin-${{ matrix.arch }}.tar.gz"

      - name: Smoke-test macOS app bundle
        env:
          FARMING_RELEASE_VERSION: ${{ steps.version.outputs.value }}
        shell: bash
        run: |
          tmp="$(mktemp -d)"
          trap 'rm -rf "${tmp}"' EXIT
          tar -xzf "releases/${FARMING_RELEASE_VERSION}/farming-${FARMING_RELEASE_VERSION}-darwin-${{ matrix.arch }}.tar.gz" -C "${tmp}"
          npm run release:cli:smoke -- "${tmp}/farming-${FARMING_RELEASE_VERSION}-darwin-${{ matrix.arch }}/farming"

      - name: Collect macOS release assets
        env:
          FARMING_RELEASE_VERSION: ${{ steps.version.outputs.value }}
        run: |
          mkdir -p release-upload
          cp "releases/${FARMING_RELEASE_VERSION}/farming_${FARMING_RELEASE_VERSION}_${{ matrix.cliAsset }}" release-upload/
          cp "releases/${FARMING_RELEASE_VERSION}/farming-${FARMING_RELEASE_VERSION}-darwin-${{ matrix.arch }}.tar.gz" release-upload/

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: farming-macos-${{ steps.version.outputs.value }}-${{ matrix.arch }}
          path: release-upload/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-macos
    env:
      FARMING_RELEASE_VERSION: ${{ github.ref_name }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Normalize release version
        id: version
        shell: bash
        run: |
          version="${FARMING_RELEASE_VERSION#v}"
          echo "value=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=v${version}" >> "${GITHUB_OUTPUT}"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify release notes
        id: notes
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.value }}
        shell: bash
        run: |
          package_version="$(node -p "require('./package.json').version")"
          lock_version="$(node -p "require('./package-lock.json').packages[''].version")"
          if [[ "${RELEASE_VERSION}" != "${package_version}" || "${RELEASE_VERSION}" != "${lock_version}" ]]; then
            echo "Tag, package.json, and package-lock.json versions must match: tag=${RELEASE_VERSION}, package=${package_version}, lock=${lock_version}" >&2
            exit 1
          fi
          notes_file="release-notes/v${RELEASE_VERSION}.md"
          if [[ ! -f "${notes_file}" ]]; then
            echo "Missing release notes: ${notes_file}" >&2
            exit 1
          fi
          body_file="${RUNNER_TEMP}/release-notes-v${RELEASE_VERSION}.md"
          NOTES_FILE="${notes_file}" BODY_FILE="${body_file}" node <<'NODE'
          const fs = require('fs');
          const version = process.env.RELEASE_VERSION;
          let body = fs.readFileSync(process.env.NOTES_FILE, 'utf8');
          body = body.replaceAll(`](./v${version}.zh_cn.md)`, `](./release-notes/v${version}.zh_cn.md)`);
          body = body.replaceAll(`](./v${version}.md)`, `](./release-notes/v${version}.md)`);
          fs.writeFileSync(process.env.BODY_FILE, body);
          NODE
          echo "file=${body_file}" >> "${GITHUB_OUTPUT}"

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate checksums and manifest
        env:
          FARMING_RELEASE_VERSION: ${{ steps.version.outputs.value }}
        shell: bash
        run: |
          cd release-assets
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum farming* > "farming_${FARMING_RELEASE_VERSION}_checksums.txt"
          else
            shasum -a 256 farming* > "farming_${FARMING_RELEASE_VERSION}_checksums.txt"
          fi
          node <<'NODE'
          const crypto = require('crypto');
          const fs = require('fs');
          const { readBundleRelease } = require('../scripts/verify-release-bundle.js');
          const version = process.env.FARMING_RELEASE_VERSION;
          const files = fs.readdirSync('.')
            .filter((file) => file.startsWith('farming'))
            .filter((file) => !file.endsWith('_checksums.txt'))
            .sort();
          const assets = files.map((file) => {
            const cliMatch = file.match(/^farming_(.+)_(darwin|linux)_(amd64|arm64)$/);
            if (cliMatch) {
              return {
                type: 'cli',
                file,
                sha256: crypto.createHash('sha256').update(fs.readFileSync(file)).digest('hex'),
                releaseVersion: cliMatch[1],
                platform: cliMatch[2],
                arch: cliMatch[3],
              };
            }
            const bundleMatch = file.match(/^farming-(.+)-(darwin|linux)-(x64|arm64)(-legacy-glibc228)?\.tar\.gz$/);
            if (bundleMatch) {
              const bundle = readBundleRelease(file);
              return {
                type: 'app-bundle',
                file,
                sha256: crypto.createHash('sha256').update(fs.readFileSync(file)).digest('hex'),
                releaseVersion: bundleMatch[1],
                packageVersion: bundle.release.packageVersion || '',
                gitSha: bundle.release.gitSha || '',
                platform: bundle.release.platform || bundleMatch[2],
                arch: bundle.release.arch || bundleMatch[3],
                compatibilityProfile: bundle.release.compatibilityProfile || (bundleMatch[4] ? 'linux-x64-legacy-glibc228' : ''),
                bundledNodeModules: bundle.release.bundledNodeModules === true,
                bundledGlibcRuntime: bundle.release.bundledGlibcRuntime === true,
              };
            }
            return { type: 'unknown', file };
          });
          const manifest = {
            name: 'farming',
            releaseVersion: version,
            tag: `v${version}`,
            gitSha: process.env.GITHUB_SHA,
            basePath: '/farming',
            sourceIncluded: false,
            builtAt: new Date().toISOString(),
            assets,
          };
          fs.writeFileSync('manifest.json', `${JSON.stringify(manifest, null, 2)}\n`);
          NODE

      - name: Publish release
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          RELEASE_VERSION: ${{ steps.version.outputs.value }}
          RELEASE_NOTES_FILE: ${{ steps.notes.outputs.file }}
        shell: bash
        run: |
          release_args=(--repo "${GITHUB_REPOSITORY}")
          if gh release view "${RELEASE_TAG}" "${release_args[@]}" >/dev/null 2>&1; then
            echo "Refusing to overwrite existing GitHub Release ${RELEASE_TAG}. Publish a new version instead." >&2
            exit 1
          fi
          create_args=(
            "${RELEASE_TAG}"
            release-assets/*
            --verify-tag
            --title "Farming ${RELEASE_VERSION}"
            --notes-file "${RELEASE_NOTES_FILE}"
          )
          if [[ "${RELEASE_VERSION}" == *-* ]]; then
            create_args+=(--prerelease)
          fi
          gh release create "${create_args[@]}" "${release_args[@]}"

  publish-npm:
    name: Publish npm package
    runs-on: ubuntu-latest
    needs:
      - publish
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install current npm CLI
        run: npm install --global npm@latest

      - name: Install dependencies
        run: npm ci --registry=https://registry.npmjs.org/

      - name: Verify package version
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          version="${RELEASE_VERSION#v}"
          package_version="$(node -p "require('./package.json').version")"
          if [ "${version}" != "${package_version}" ]; then
            echo "Tag and npm package versions must match: tag=${version}, package=${package_version}" >&2
            exit 1
          fi
          if npm view "farming-code@${version}" version >/dev/null 2>&1; then
            echo "Refusing to overwrite farming-code@${version}" >&2
            exit 1
          fi

      - name: Run checks
        run: npm run check

      - name: Smoke-test packed npm package
        run: npm run release:npm:smoke

      - name: Publish npm package with provenance
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "${NPM_TOKEN}" ]; then
            printf '//registry.npmjs.org/:_authToken=%s\n' "${NPM_TOKEN}" > "${HOME}/.npmrc"
          fi
          version="$(node -p "require('./package.json').version")"
          dist_tag="latest"
          if [[ "${version}" == *-* ]]; then
            dist_tag="next"
          fi
          npm publish --access public --provenance --tag "${dist_tag}"
